          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /trash:
    get:
      operationId: getTrash
      tags: [trash]
      summary: Get trash items
      parameters:
        - name: agencyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Trash items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrashItem"

  /trash/{id}/restore:
    post:
      operationId: restoreTrashItem
      tags: [trash]
      summary: Restore a trash item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      parameters:
        - name: agencyId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /movements:
    get:
      operationId: getMovements
      tags: [payments]
      summary: List loan movements
      parameters:
        - name: loanId
          in: query
          schema:
            type: integer
        - name: agencyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movement"

  /interest/calculate:
    post:
      operationId: calculateInterest
      tags: [loans]
      summary: Run interest calculation job
      responses:
        "200":
          description: Interest calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    RecoveryRequest:
      type: object
      properties:
        username:
          type: string
      required:
        - username

    ApproveRecoveryRequest:
      type: object
      properties:
        newPassword:
          type: string
      required:
        - newPassword

    ApproveRecoveryResponse:
      type: object
      properties:
        newPassword:
          type: string
        userName:
          type: string
      required:
        - newPassword
        - userName

    Agency:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        active:
          type: boolean
        currency:
          type: string
        baseRate:
          type: number
          description: Default interest rate (e.g. 0.10 = 10%)
        graceDaysDisbursement:
          type: integer
          description: Grace days after disbursement before interest accrues
        graceDaysPayment:
          type: integer
          description: Grace days after payment before new interest accrues
        paymentMethods:
          type: array
          items:
            type: string
        banks:
          type: array
          items:
            $ref: "#/components/schemas/BankConfig"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - city
        - active
        - currency
        - baseRate
        - graceDaysDisbursement
        - graceDaysPayment
        - paymentMethods
        - banks
        - createdAt

    BankConfig:
