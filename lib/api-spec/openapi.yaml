      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReassignRequest"
      responses:
        "200":
          description: Client reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /loans:
    get:
      operationId: getLoans
      tags: [loans]
      summary: List loans
      parameters:
        - name: agencyId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: integer
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
    post:
      operationId: createLoan
      tags: [loans]
      summary: Request a new loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoanRequest"
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}:
    get:
      operationId: getLoan
      tags: [loans]
      summary: Get loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}/approve:
    post:
      operationId: approveLoan
      tags: [loans]
      summary: Approve a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loan approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}/reject:
    post:
      operationId: rejectLoan
      tags: [loans]
      summary: Reject a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Loan rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}/disburse:
    post:
      operationId: disburseLoan
      tags: [loans]
      summary: Disburse a loan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisburseRequest"
      responses:
        "200":
          description: Loan disbursed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /loans/{id}/reverse:
    post:
      operationId: reverseLoan
      tags: [loans]
      summary: Reverse a disbursement (SuperAdmin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disbursement reversed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: List payments
      parameters:
        - name: agencyId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: loanId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: registerPayment
      tags: [payments]
      summary: Register a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPaymentRequest"
      responses:
        "201":
          description: Payment registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/reconcile:
    post:
      operationId: reconcilePayment
      tags: [payments]
      summary: Reconcile a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileRequest"
      responses:
        "200":
          description: Payment reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/reverse:
    post:
      operationId: reversePayment
      tags: [payments]
      summary: Reverse a reconciled payment (SuperAdmin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment reversed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /funders:
    get:
      operationId: getFunders
      tags: [funders]
      summary: List funders
      parameters:
        - name: agencyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of funders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Funder"
    post:
      operationId: createFunder
      tags: [funders]
      summary: Create funder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFunderRequest"
      responses:
        "201":
          description: Funder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Funder"

  /funders/{id}:
    put:
      operationId: updateFunder
      tags: [funders]
      summary: Update funder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFunderRequest"
      responses:
        "200":
          description: Funder updated
          content:
            application/json:
              schema:
