openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: PrestaRapi - Sistema de Gestión de Préstamos
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: agencies
    description: Agency management
  - name: users
    description: User management
  - name: clients
    description: Client management
  - name: loans
    description: Loan management
  - name: payments
    description: Payment management
  - name: funders
    description: Funder management
  - name: holidays
    description: Holiday management
  - name: audit
    description: Audit log
  - name: trash
    description: Trash/recycle bin
  - name: dashboard
    description: Dashboard stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/recover-request:
    post:
      operationId: requestPasswordRecovery
      tags: [auth]
      summary: Request password recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoveryRequest"
      responses:
        "200":
          description: Recovery request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/recover-approve/{userId}:
    post:
      operationId: approvePasswordRecovery
      tags: [auth]
      summary: Approve password recovery and set new password
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRecoveryRequest"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveRecoveryResponse"

  /agencies:
    get:
      operationId: getAgencies
      tags: [agencies]
      summary: List agencies
      responses:
        "200":
          description: List of agencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agency"
    post:
      operationId: createAgency
      tags: [agencies]
      summary: Create agency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyRequest"
      responses:
        "201":
          description: Agency created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"

  /agencies/{id}:
    get:
      operationId: getAgency
      tags: [agencies]
      summary: Get agency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
    put:
      operationId: updateAgency
      tags: [agencies]
      summary: Update agency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyRequest"
      responses:
        "200":
          description: Agency updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
    delete:
      operationId: deleteAgency
      tags: [agencies]
      summary: Soft-delete agency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
